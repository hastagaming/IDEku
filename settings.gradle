pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
        // Daftarkan folder libs sebagai repositori lokal
        flatDir {
            dirs 'app/libs'
        }
    }
}

rootProject.name = "IDEku"
include ':app'
