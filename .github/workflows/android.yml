name: NASA-IDE-BUILDER

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Emergency Module Patch
        run: |
          # Kita ambil versi asli terminal-view langsung dari sumber Termux
          git clone --depth 1 https://github.com/termux/termux-app.git temp_termux
          
          # Hapus folder terminal-view-lib yang "kosong" itu
          rm -rf terminal-view-lib terminal-view
          
          # Salin folder terminal-view yang asli (berisi source code, bukan .aar)
          cp -r temp_termux/terminal-view .
          cp -r temp_termux/terminal-emulator .
          
          # Bersihkan sampah
          rm -rf temp_termux

      - name: Grant Execute Permissions (Global)
        # Kita beri izin ke SEMUA file .sh dan gradlew di semua subfolder
        run: |
          chmod +x gradlew
          find . -type f -name "*.sh" -exec chmod +x {} +
          find . -type f -name "gradlew" -exec chmod +x {} +

      - name: Build with Gradle
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IDEku-Development
          path: app/build/outputs/apk/debug/app-debug.apk
