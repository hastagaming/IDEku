name: IDEku Builder

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'README.us.md'
      - 'LICENSE'
  workflow_dispatch:

# Izin akses untuk menulis ke Release Tab
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Auto-Fetch & Clean Overwrite Modules
        run: |
          # 1. Ambil Source Termux
          git clone --depth 1 https://github.com/termux/termux-app.git temp_termux
          rm -rf terminal-view terminal-emulator
          
          cp -r temp_termux/terminal-view .
          cp -r temp_termux/terminal-emulator .
          
          if [ -d "temp_termux/terminal-common" ]; then
            cp -r temp_termux/terminal-common .
          fi
          rm -rf temp_termux

          # 2. Patch Manifest
          sed -i '/sdkVersion/d' terminal-view/src/main/AndroidManifest.xml
          sed -i '/sdkVersion/d' terminal-emulator/src/main/AndroidManifest.xml

          # 3. Rakit terminal-emulator/build.gradle (JNI Header Fix)
          cat << 'EOF' > terminal-emulator/build.gradle
          apply plugin: 'com.android.library'
          android {
              namespace "com.termux.terminal"
              compileSdk 34
              ndkVersion "26.1.10909125"
              defaultConfig {
                  minSdk 24
                  targetSdk 34
                  externalNativeBuild {
                      ndkBuild {
                          cFlags "-std=c11", "-Wall", "-Wextra", "-Os", "-I${projectDir}/src/main/jni"
                      }
                  }
                  ndk {
                      abiFilters 'x86', 'x86_64', 'armeabi-v7a', 'arm64-v8a'
                  }
              }
              externalNativeBuild {
                  ndkBuild {
                      path "src/main/jni/Android.mk"
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation "androidx.annotation:annotation:1.7.0"
              testImplementation "junit:junit:4.13.2"
          }
          EOF

          # 4. Rakit terminal-view/build.gradle
          cat << 'EOF' > terminal-view/build.gradle
          apply plugin: 'com.android.library'
          android { namespace 'com.termux.view'; compileSdk 34; defaultConfig { minSdk 24 } }
          dependencies {
              implementation project(':terminal-emulator')
              implementation 'androidx.annotation:annotation:1.7.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Grant Permissions
        run: chmod +x gradlew

      - name: Build All Variants
        run: ./gradlew clean assembleRelease --no-daemon

      - name: Manual Sign & Zipalign APK (The Highlander Tactic)
        run: |
          # 1. Bersihkan sisa-sisa perang
          rm -f *.apk *.jks release.jks input.apk aligned.apk
          
          # 2. Identifikasi Tools secara manual
          # Kita ambil versi build-tools tertinggi yang tersedia
          BT_PATH=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -n 1)
          ZIPALIGN="$BT_PATH/zipalign"
          APKSIGNER="$BT_PATH/apksigner"
          
          echo "DEBUG: Menggunakan tools dari $BT_PATH"

          # 3. TAKTIK HIGHLANDER: Cari semua APK, tapi HAPUS semua kecuali satu
          # Kita pindah ke folder output dulu agar shell tidak bingung dengan path panjang
          cd app/build/outputs/apk/release/
          
          # Ambil nama satu file APK yang paling valid
          TARGET_APK=$(ls *.apk | head -n 1)
          
          if [ -z "$TARGET_APK" ]; then
            echo "ERROR: Tidak ada APK yang ditemukan di folder release!"
            exit 1
          fi
          
          echo "DEBUG: Mengunci target tunggal -> $TARGET_APK"
          
          # Pindahkan ke root workspace dengan nama yang sangat sederhana
          cp "$TARGET_APK" "$GITHUB_WORKSPACE/input.apk"
          
          # Kembali ke root workspace
          cd "$GITHUB_WORKSPACE"

          # 4. Siapkan Keystore
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > release.jks
          if [ ! -s release.jks ]; then echo "ERROR: Keystore gagal dibuat!"; exit 1; fi

          # 5. Eksekusi Zipalign (Hanya pada 1 file pasti: input.apk)
          "$ZIPALIGN" -f -v 4 input.apk aligned.apk

          # 6. Eksekusi Signing (Hanya pada 1 file pasti: aligned.apk)
          # Baris ini yang tadinya error di 1129, sekarang foldernya bersih
          "$APKSIGNER" sign --ks release.jks \
            --ks-key-alias "${{ secrets.ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEY_STORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out IDEku-Final.apk \
            aligned.apk

          # 7. Verifikasi
          "$APKSIGNER" verify IDEku-Final.apk
          echo "AKHIRNYA! Misi selesai, Komandan Nasa!"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: IDEku-Final.apk
          name: "IDEku Build v1.0.${{ github.run_number }}"
          tag_name: "v1.0.${{ github.run_number }}"
          body: |
            ### 🚀 NASA-IDE Build Success!
            - **Commit:** `${{ github.sha }}`
            - **Status:** Signed, Zipaligned, & NDK-Enabled.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
