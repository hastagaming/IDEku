name: NASA-IDE-BUILDER

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Auto-Fetch & Force-Patch Modules
        run: |
          # 1. Ambil modul asli
          git clone --depth 1 https://github.com/termux/termux-app.git temp_termux
          rm -rf terminal-view terminal-emulator
          mv temp_termux/terminal-view .
          mv temp_termux/terminal-emulator .
          rm -rf temp_termux

          # 2. PATCH: Hapus paksa barisSdkVersion di Manifest agar tidak bentrok
          sed -i '/sdkVersion/d' terminal-view/src/main/AndroidManifest.xml
          sed -i '/sdkVersion/d' terminal-emulator/src/main/AndroidManifest.xml

          # 3. OVERWRITE: Ganti isi build.gradle terminal-view agar bersih
          cat <<EOF > terminal-view/build.gradle
          apply plugin: 'com.android.library'
          android {
              namespace "com.termux.view"
              compileSdk 34
              defaultConfig { minSdk 24 }
          }
          EOF

          # 4. OVERWRITE: Ganti isi build.gradle terminal-emulator
          cat <<EOF > terminal-emulator/build.gradle
          apply plugin: 'com.android.library'
          android {
              namespace "com.termux.terminal"
              compileSdk 34
              defaultConfig { minSdk 24 }
          }
          EOF

      - name: Grant Execute Permissions (Global)
        # Kita beri izin ke SEMUA file .sh dan gradlew di semua subfolder
        run: |
          chmod +x gradlew
          find . -type f -name "*.sh" -exec chmod +x {} +
          find . -type f -name "gradlew" -exec chmod +x {} +

      - name: Build with Gradle
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IDEku-Development
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Create Release & Upload APK
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ steps.sign_app.outputs.signedReleaseFile }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
