name: NASA-IDE-BUILDER

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Auto-Fetch & Patch Termux Modules
        run: |
          # 1. Ambil modul asli dari markas Termux
          git clone --depth 1 https://github.com/termux/termux-app.git temp_termux
          rm -rf terminal-view terminal-emulator
          cp -r temp_termux/terminal-view .
          cp -r temp_termux/terminal-emulator .
          rm -rf temp_termux

          # 2. PATCH: Hapus minSdk/targetSdk dari Manifest (Hapus baris yang mengandung 'sdk')
          sed -i '/sdkVersion/d' terminal-view/src/main/AndroidManifest.xml
          sed -i '/sdkVersion/d' terminal-emulator/src/main/AndroidManifest.xml
          
          # 3. PATCH: Injeksi Namespace langsung ke baris ke-2 build.gradle
          # Ini cara paling aman agar tidak bentrok dengan blok 'android {}'
          sed -i '2i android { namespace "com.termux.view" }' terminal-view/build.gradle
          sed -i '2i android { namespace "com.termux.terminal" }' terminal-emulator/build.gradle

          # 4. PATCH: Hapus baris compileSdkVersion yang mungkin beda versi
          sed -i '/compileSdkVersion/d' terminal-view/build.gradle
          sed -i '/targetSdkVersion/d' terminal-view/build.gradle

      - name: Grant Execute Permissions (Global)
        # Kita beri izin ke SEMUA file .sh dan gradlew di semua subfolder
        run: |
          chmod +x gradlew
          find . -type f -name "*.sh" -exec chmod +x {} +
          find . -type f -name "gradlew" -exec chmod +x {} +

      - name: Build with Gradle
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IDEku-Development
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Create Release & Upload APK
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ steps.sign_app.outputs.signedReleaseFile }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
