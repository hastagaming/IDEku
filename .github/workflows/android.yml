name: IDEku Builder

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'README.us.md'
      - 'LICENSE'
  workflow_dispatch:

# Izin akses untuk menulis ke Release Tab
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_VERSION: "1.0.${{ github.run_number }}"
      FINAL_APK_NAME: "IDEku-1.0.${{ github.run_number }}.apk"

    steps:
      - name: Clone Repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Auto-Fetch & Clean Overwrite Modules
        run: |
          # 1. Ambil Source Termux
          git clone --depth 1 https://github.com/termux/termux-app.git temp_termux
          rm -rf terminal-view terminal-emulator
          
          cp -r temp_termux/terminal-view .
          cp -r temp_termux/terminal-emulator .
          
          if [ -d "temp_termux/terminal-common" ]; then
            cp -r temp_termux/terminal-common .
          fi
          rm -rf temp_termux

          # 2. Patch Manifest
          sed -i '/sdkVersion/d' terminal-view/src/main/AndroidManifest.xml
          sed -i '/sdkVersion/d' terminal-emulator/src/main/AndroidManifest.xml

          # 3. Rakit terminal-emulator/build.gradle (JNI Header Fix)
          cat << 'EOF' > terminal-emulator/build.gradle
          apply plugin: 'com.android.library'
          android {
              namespace "com.termux.terminal"
              compileSdk 34
              ndkVersion "26.1.10909125"
              defaultConfig {
                  minSdk 24
                  targetSdk 34
                  externalNativeBuild {
                      ndkBuild {
                          cFlags "-std=c11", "-Wall", "-Wextra", "-Os", "-I${projectDir}/src/main/jni"
                      }
                  }
                  ndk {
                      abiFilters 'x86', 'x86_64', 'armeabi-v7a', 'arm64-v8a'
                  }
              }
              externalNativeBuild {
                  ndkBuild {
                      path "src/main/jni/Android.mk"
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation "androidx.annotation:annotation:1.7.0"
              testImplementation "junit:junit:4.13.2"
          }
          EOF

          # 4. Rakit terminal-view/build.gradle
          cat << 'EOF' > terminal-view/build.gradle
          apply plugin: 'com.android.library'
          android { namespace 'com.termux.view'; compileSdk 34; defaultConfig { minSdk 24 } }
          dependencies {
              implementation project(':terminal-emulator')
              implementation 'androidx.annotation:annotation:1.7.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Grant Permissions
        run: chmod +x gradlew

      - name: Build All Variants
        run: ./gradlew clean assembleRelease --no-daemon

      - name: Manual Sign & Zipalign APK (Ultimate Env Shield)
        # KITA PINDAHKAN SEMUA SECRET KE DALAM ENVIRONMENT (SANGAT AMAN)
        env:
          ALIAS_NAME: ${{ secrets.ALIAS }}
          KS_PASS: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
          BASE64_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          # 1. Siapkan Bunker
          mkdir -p bunker
          rm -rf bunker/*
          
          # 2. Amankan Tools
          BT_PATH=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -n 1)
          ZIPALIGN="$BT_PATH/zipalign"
          APKSIGNER_JAR="$BT_PATH/lib/apksigner.jar"

          # 3. Kunci Target APK
          TARGET=$(find app/build/outputs/apk/release -name "*.apk" -type f | head -n 1)
          if [ -z "$TARGET" ]; then echo "ERROR: APK tidak ditemukan!"; exit 1; fi
          cp "$TARGET" bunker/input.apk

          # 4. Decode Keystore dengan Aman (Mengabaikan karakter enter/spasi gaib)
          echo "$BASE64_KEY" | tr -d '\n\r ' | base64 -d > bunker/release.jks

          # 5. Zipalign
          "$ZIPALIGN" -f -v 4 bunker/input.apk bunker/aligned.apk

          # 6. SIGNING (ANTI-BOCOR)
          # Menggunakan 'env:NAMA_VARIABEL' agar apksigner membaca password sendiri di latar belakang
          java -jar "$APKSIGNER_JAR" sign \
            --ks bunker/release.jks \
            --ks-key-alias "$ALIAS_NAME" \
            --ks-pass "env:KS_PASS" \
            --key-pass "env:KEY_PASS" \
            --out "$FINAL_APK_NAME" \
            bunker/aligned.apk

          # 7. Verifikasi
          java -jar "$APKSIGNER_JAR" verify "$FINAL_APK_NAME"
          echo "BERHASIL: $FINAL_APK_NAME siap rilis!"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: "${{ env.FINAL_APK_NAME }}"
          name: "IDEku-Build-v${{ env.APP_VERSION }}"
          tag_name: "v${{ env.APP_VERSION }}"
          body: |
            ### 🚀 NASA-IDE Build Success!
            - **Versi:** `${{ env.APP_VERSION }}`
            - **Status:** Signed & Zipaligned.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
