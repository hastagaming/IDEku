name: IDEku Builder

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'README.us.md'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Auto-Fetch & Clean Overwrite Modules
        run: |
          # 1. Ambil Source Termux (Gunakan depth 1 agar cepat)
          git clone --depth 1 https://github.com/termux/termux-app.git temp_termux
          rm -rf terminal-view terminal-emulator
          
          # Salin modul utama
          cp -r temp_termux/terminal-view .
          cp -r temp_termux/terminal-emulator .
          
          # Cek dependensi common jika ada (opsional tapi disarankan)
          if [ -d "temp_termux/terminal-common" ]; then
            cp -r temp_termux/terminal-common .
          fi
          rm -rf temp_termux

          # 2. Patch Manifest (Bersihkan baris sdkVersion yang bikin bentrok)
          sed -i '/sdkVersion/d' terminal-view/src/main/AndroidManifest.xml
          sed -i '/sdkVersion/d' terminal-emulator/src/main/AndroidManifest.xml

          # 3. Rakit terminal-emulator/build.gradle (Dengan Perbaikan JNI Header)
          cat << 'EOF' > terminal-emulator/build.gradle
          apply plugin: 'com.android.library'
          android {
              namespace "com.termux.terminal"
              compileSdk 34
              ndkVersion "26.1.10909125"
              defaultConfig {
                  minSdk 24
                  targetSdk 34
                  externalNativeBuild {
                      ndkBuild {
                          // Tambahkan Include Path agar header JNI ditemukan
                          cFlags "-std=c11", "-Wall", "-Wextra", "-Os", "-I${projectDir}/src/main/jni"
                      }
                  }
                  ndk {
                      abiFilters 'x86', 'x86_64', 'armeabi-v7a', 'arm64-v8a'
                  }
              }
              externalNativeBuild {
                  ndkBuild {
                      path "src/main/jni/Android.mk"
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation "androidx.annotation:annotation:1.7.0"
              testImplementation "junit:junit:4.13.2"
          }
          EOF

          # 4. Rakit terminal-view/build.gradle
          cat << 'EOF' > terminal-view/build.gradle
          apply plugin: 'com.android.library'
          android { namespace 'com.termux.view'; compileSdk 34; defaultConfig { minSdk 24 } }
          dependencies {
              implementation project(':terminal-emulator')
              implementation 'androidx.annotation:annotation:1.7.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Grant Permissions
        run: chmod +x gradlew

      - name: Build All Variants
        run: ./gradlew clean assembleRelease --no-daemon

      - name: Manual Sign & Zipalign APK
        run: |
          # 1. Cari Tools (Cari yang terbaru di build-tools)
          ZIPALIGN=$(find $ANDROID_HOME/build-tools -name "zipalign" | sort -V | tail -n 1)
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name "apksigner" | sort -V | tail -n 1)

          # 2. Sniper Target APK (Hanya ambil file release, abaikan debug)
          TARGET_APK=$(find app/build/outputs/apk/release -name "*release*.apk" | head -n 1)
          
          if [ -z "$TARGET_APK" ]; then
            echo "ERROR: APK Release tidak ditemukan!"
            exit 1
          fi
          
          echo "Memproses: $TARGET_APK"

          # 3. Ekstrak Keystore dari Secrets
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > release.jks

          # 4. Zipalign (Wajib untuk rilis Play Store/Produksi)
          $ZIPALIGN -v 4 "$TARGET_APK" IDEku-Final-Aligned.apk

          # 5. Signing (Tanda tangan basah)
          $APKSIGNER sign --ks release.jks \
            --ks-key-alias "${{ secrets.ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEY_STORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out IDEku-Final.apk \
            IDEku-Final-Aligned.apk

          # 6. Verifikasi
          $APKSIGNER verify IDEku-Final.apk
          echo "APK SIAP TEMPUR: IDEku-Final.apk"

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: IDEku-Final-Build
          path: IDEku-Final.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: IDEku-Final.apk
          name: "IDEku Auto Build #${{ github.run_number }}"
          tag_name: "v1.0.${{ github.run_number }}"
          body: |
            Build otomatis IDEku sukses!
            - Commit: ${{ github.event.head_commit.message }}
            - Mesin Terminal (NDK/C++) terkompilasi penuh.
            - Status: Signed & Aligned.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
