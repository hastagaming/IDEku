name: IDEku Builder

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'README.us.md'
      - 'LICENSE'
  workflow_dispatch:

# Izin akses untuk menulis ke Release Tab
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Auto-Fetch & Clean Overwrite Modules
        run: |
          # 1. Ambil Source Termux
          git clone --depth 1 https://github.com/termux/termux-app.git temp_termux
          rm -rf terminal-view terminal-emulator
          
          cp -r temp_termux/terminal-view .
          cp -r temp_termux/terminal-emulator .
          
          if [ -d "temp_termux/terminal-common" ]; then
            cp -r temp_termux/terminal-common .
          fi
          rm -rf temp_termux

          # 2. Patch Manifest
          sed -i '/sdkVersion/d' terminal-view/src/main/AndroidManifest.xml
          sed -i '/sdkVersion/d' terminal-emulator/src/main/AndroidManifest.xml

          # 3. Rakit terminal-emulator/build.gradle (JNI Header Fix)
          cat << 'EOF' > terminal-emulator/build.gradle
          apply plugin: 'com.android.library'
          android {
              namespace "com.termux.terminal"
              compileSdk 34
              ndkVersion "26.1.10909125"
              defaultConfig {
                  minSdk 24
                  targetSdk 34
                  externalNativeBuild {
                      ndkBuild {
                          cFlags "-std=c11", "-Wall", "-Wextra", "-Os", "-I${projectDir}/src/main/jni"
                      }
                  }
                  ndk {
                      abiFilters 'x86', 'x86_64', 'armeabi-v7a', 'arm64-v8a'
                  }
              }
              externalNativeBuild {
                  ndkBuild {
                      path "src/main/jni/Android.mk"
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation "androidx.annotation:annotation:1.7.0"
              testImplementation "junit:junit:4.13.2"
          }
          EOF

          # 4. Rakit terminal-view/build.gradle
          cat << 'EOF' > terminal-view/build.gradle
          apply plugin: 'com.android.library'
          android { namespace 'com.termux.view'; compileSdk 34; defaultConfig { minSdk 24 } }
          dependencies {
              implementation project(':terminal-emulator')
              implementation 'androidx.annotation:annotation:1.7.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Grant Permissions
        run: chmod +x gradlew

      - name: Build All Variants
        run: ./gradlew clean assembleRelease --no-daemon

      - name: Manual Sign & Zipalign APK (Diagnostic & Force)
        run: |
          # 1. Bersihkan area kerja
          rm -f input.apk aligned-temp.apk IDEku-Final.apk release.jks
          
          # 2. CARI TOOLS (Taktik Agresif)
          # Kita cari di folder build-tools dan ambil yang versinya paling tinggi secara manual
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -n 1)
          ZIPALIGN="$BUILD_TOOLS_DIR/zipalign"
          APKSIGNER="$BUILD_TOOLS_DIR/apksigner"

          echo "DEBUG: Menggunakan Build-Tools dari: $BUILD_TOOLS_DIR"
          
          # 3. VERIFIKASI TOOLS
          if [ ! -f "$ZIPALIGN" ]; then echo "ERROR: Zipalign tidak ditemukan di $ZIPALIGN"; exit 1; fi
          if [ ! -f "$APKSIGNER" ]; then echo "ERROR: Apksigner tidak ditemukan di $APKSIGNER"; exit 1; fi

          # 4. KUNCI TARGET APK
          # Kita cari APK di manapun dia berada di dalam folder app/build
          TARGET_FILE=$(find app/build/outputs/apk/release -name "*.apk" -type f | head -n 1)
          
          if [ -z "$TARGET_FILE" ]; then
            echo "ERROR: Gradle gagal membuat APK. Cek log Build Project di atas!"
            exit 1
          fi
          echo "DEBUG: Target ditemukan -> $TARGET_FILE"
          cp "$TARGET_FILE" input.apk

          # 5. SIAPKAN KEYSTORE
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > release.jks
          if [ ! -s release.jks ]; then echo "ERROR: Keystore kosong! Cek Secret SIGNING_KEY"; exit 1; fi

          # 6. EKSEKUSI ZIPALIGN
          echo "Menjalankan Zipalign..."
          "$ZIPALIGN" -f -v 4 input.apk aligned-temp.apk

          # 7. EKSEKUSI SIGNING
          echo "Menjalankan Apksigner..."
          "$APKSIGNER" sign --ks release.jks \
            --ks-key-alias "${{ secrets.ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEY_STORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out IDEku-Final.apk \
            aligned-temp.apk

          # 8. VERIFIKASI AKHIR
          "$APKSIGNER" verify IDEku-Final.apk
          echo "MISI SUKSES: IDEku-Final.apk telah lahir!"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: IDEku-Final.apk
          name: "IDEku Build v1.0.${{ github.run_number }}"
          tag_name: "v1.0.${{ github.run_number }}"
          body: |
            ### 🚀 NASA-IDE Build Success!
            - **Commit:** `${{ github.sha }}`
            - **Status:** Signed, Zipaligned, & NDK-Enabled.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
