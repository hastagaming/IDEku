name: IDEku Builder

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'README.us.md'
      - 'LICENSE'
  workflow_dispatch:

# Izin akses untuk menulis ke Release Tab
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Auto-Fetch & Clean Overwrite Modules
        run: |
          # 1. Ambil Source Termux
          git clone --depth 1 https://github.com/termux/termux-app.git temp_termux
          rm -rf terminal-view terminal-emulator
          
          cp -r temp_termux/terminal-view .
          cp -r temp_termux/terminal-emulator .
          
          if [ -d "temp_termux/terminal-common" ]; then
            cp -r temp_termux/terminal-common .
          fi
          rm -rf temp_termux

          # 2. Patch Manifest
          sed -i '/sdkVersion/d' terminal-view/src/main/AndroidManifest.xml
          sed -i '/sdkVersion/d' terminal-emulator/src/main/AndroidManifest.xml

          # 3. Rakit terminal-emulator/build.gradle (JNI Header Fix)
          cat << 'EOF' > terminal-emulator/build.gradle
          apply plugin: 'com.android.library'
          android {
              namespace "com.termux.terminal"
              compileSdk 34
              ndkVersion "26.1.10909125"
              defaultConfig {
                  minSdk 24
                  targetSdk 34
                  externalNativeBuild {
                      ndkBuild {
                          cFlags "-std=c11", "-Wall", "-Wextra", "-Os", "-I${projectDir}/src/main/jni"
                      }
                  }
                  ndk {
                      abiFilters 'x86', 'x86_64', 'armeabi-v7a', 'arm64-v8a'
                  }
              }
              externalNativeBuild {
                  ndkBuild {
                      path "src/main/jni/Android.mk"
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation "androidx.annotation:annotation:1.7.0"
              testImplementation "junit:junit:4.13.2"
          }
          EOF

          # 4. Rakit terminal-view/build.gradle
          cat << 'EOF' > terminal-view/build.gradle
          apply plugin: 'com.android.library'
          android { namespace 'com.termux.view'; compileSdk 34; defaultConfig { minSdk 24 } }
          dependencies {
              implementation project(':terminal-emulator')
              implementation 'androidx.annotation:annotation:1.7.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Grant Permissions
        run: chmod +x gradlew

      - name: Build Project
        run: ./gradlew clean assembleRelease --no-daemon

      - name: Manual Sign & Zipalign APK
        run: |
          # 1. Bersihkan medan tempur total
          rm -f input.apk aligned-temp.apk IDEku-Final.apk release.jks
          
          # 2. Amankan Tools
          ZIPALIGN=$(find $ANDROID_HOME/build-tools -name "zipalign" | sort -V | tail -n 1)
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name "apksigner" | sort -V | tail -n 1)

          # 3. TAKTIK FILTER MUTLAK: Ambil semua list, potong paksa, ambil baris pertama saja
          # Ini menjamin 1000% variabel SELECTED_APK hanya berisi SATU nama file
          SELECTED_APK=$(ls app/build/outputs/apk/release/*.apk 2>/dev/null | head -n 1)
          
          # Fallback jika ada di dalam sub-folder
          if [ -z "$SELECTED_APK" ]; then
            SELECTED_APK=$(ls app/build/outputs/apk/release/*/*.apk 2>/dev/null | head -n 1)
          fi

          if [ -z "$SELECTED_APK" ]; then
            echo "ERROR: Gradle sama sekali tidak menghasilkan file APK!"
            exit 1
          fi

          echo "Target terkunci sempurna pada: $SELECTED_APK"

          # 4. Salin satu file tersebut menjadi input.apk
          # Karena SELECTED_APK PASTI HANYA SATU, perintah cp tidak akan pernah error
          cp "$SELECTED_APK" input.apk
          
          if [ ! -f "input.apk" ]; then
            echo "ERROR: Proses isolasi file gagal!"
            exit 1
          fi

          # 5. Siapkan Keystore
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > release.jks

          # 6. Zipalign (Input tunggal yang sudah dipastikan: input.apk)
          "$ZIPALIGN" -f -v 4 input.apk aligned-temp.apk

          # 7. Signing
          "$APKSIGNER" sign --ks release.jks \
            --ks-key-alias "${{ secrets.ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEY_STORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out IDEku-Final.apk \
            aligned-temp.apk

          # 8. Verifikasi
          "$APKSIGNER" verify IDEku-Final.apk
          echo "MISI SELESAI: IDEku-Final.apk berhasil lolos dari neraka error."

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: IDEku-Final.apk
          name: "IDEku Build v1.0.${{ github.run_number }}"
          tag_name: "v1.0.${{ github.run_number }}"
          body: |
            ### 🚀 NASA-IDE Build Success!
            - **Commit:** `${{ github.sha }}`
            - **Status:** Signed, Zipaligned, & NDK-Enabled.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
