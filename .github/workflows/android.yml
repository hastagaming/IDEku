name: NASA-IDE-BUILDER

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'README.us.md'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Auto-Fetch & Clean Overwrite Modules
        run: |
          git clone --depth 1 https://github.com/termux/termux-app.git temp_termux
          rm -rf terminal-view terminal-emulator
          cp -r temp_termux/terminal-view .
          cp -r temp_termux/terminal-emulator .
          rm -rf temp_termux

          # Patch Manifest & Build.gradle (Suntik Dependensi AndroidX agar tidak error Java)
          sed -i '/sdkVersion/d' terminal-view/src/main/AndroidManifest.xml
          sed -i '/sdkVersion/d' terminal-emulator/src/main/AndroidManifest.xml

          cat << 'EOF' > terminal-emulator/build.gradle
          apply plugin: 'com.android.library'
          android { namespace 'com.termux.terminal'; compileSdk 34; defaultConfig { minSdk 24 } }
          dependencies { implementation 'androidx.annotation:annotation:1.7.0' }
          EOF

          cat << 'EOF' > terminal-view/build.gradle
          apply plugin: 'com.android.library'
          android { namespace 'com.termux.view'; compileSdk 34; defaultConfig { minSdk 24 } }
          dependencies { 
              implementation project(':terminal-emulator')
              implementation 'androidx.annotation:annotation:1.7.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Grant Permissions
        run: chmod +x gradlew

      - name: Build All Variants
        # Kita jalankan assembleRelease agar folder release terisi untuk proses Signing
        run: ./gradlew assembleDebug assembleRelease --no-daemon

      - name: Upload Debug Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IDEku-Debug-Unsigned
          path: app/build/outputs/apk/debug/*.apk

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          env:
          # TAMBAHKAN BARIS DI BAWAH INI
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Create Release (Full Auto)
        uses: softprops/action-gh-release@v1
        # Tanpa tag manual, kita buat tag otomatis berdasarkan nomor build
        with:
          files: ${{ steps.sign_app.outputs.signedReleaseFile }}
          name: "Auto Build #${{ github.run_number }}"
          tag_name: "v${{ github.run_number }}"
          body: "Build otomatis dari commit: ${{ github.event.head_commit.message }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
