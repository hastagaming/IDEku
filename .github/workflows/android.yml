name: IDEku Builder

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'README.us.md'
      - 'LICENSE'
  workflow_dispatch:

# Izin akses untuk menulis ke Release Tab
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Auto-Fetch & Clean Overwrite Modules
        run: |
          # 1. Ambil Source Termux
          git clone --depth 1 https://github.com/termux/termux-app.git temp_termux
          rm -rf terminal-view terminal-emulator
          
          cp -r temp_termux/terminal-view .
          cp -r temp_termux/terminal-emulator .
          
          if [ -d "temp_termux/terminal-common" ]; then
            cp -r temp_termux/terminal-common .
          fi
          rm -rf temp_termux

          # 2. Patch Manifest
          sed -i '/sdkVersion/d' terminal-view/src/main/AndroidManifest.xml
          sed -i '/sdkVersion/d' terminal-emulator/src/main/AndroidManifest.xml

          # 3. Rakit terminal-emulator/build.gradle (JNI Header Fix)
          cat << 'EOF' > terminal-emulator/build.gradle
          apply plugin: 'com.android.library'
          android {
              namespace "com.termux.terminal"
              compileSdk 34
              ndkVersion "26.1.10909125"
              defaultConfig {
                  minSdk 24
                  targetSdk 34
                  externalNativeBuild {
                      ndkBuild {
                          cFlags "-std=c11", "-Wall", "-Wextra", "-Os", "-I${projectDir}/src/main/jni"
                      }
                  }
                  ndk {
                      abiFilters 'x86', 'x86_64', 'armeabi-v7a', 'arm64-v8a'
                  }
              }
              externalNativeBuild {
                  ndkBuild {
                      path "src/main/jni/Android.mk"
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation "androidx.annotation:annotation:1.7.0"
              testImplementation "junit:junit:4.13.2"
          }
          EOF

          # 4. Rakit terminal-view/build.gradle
          cat << 'EOF' > terminal-view/build.gradle
          apply plugin: 'com.android.library'
          android { namespace 'com.termux.view'; compileSdk 34; defaultConfig { minSdk 24 } }
          dependencies {
              implementation project(':terminal-emulator')
              implementation 'androidx.annotation:annotation:1.7.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Grant Permissions
        run: chmod +x gradlew

      - name: Build Project
        run: ./gradlew clean assembleRelease --no-daemon

      - name: Manual Sign & Zipalign APK (Bunker Mode)
        run: |
          # 1. Siapkan Bunker (Direktori Terisolasi)
          mkdir -p bunker_zone
          rm -rf bunker_zone/*
          
          # 2. Amankan Tools (Zipalign & Apksigner)
          ZIPALIGN=$(find $ANDROID_HOME/build-tools -name "zipalign" | sort -V | tail -n 1)
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name "apksigner" | sort -V | tail -n 1)

          # 3. Amankan Target: Ambil TEPAT SATU APK hasil build
          # Kita gunakan find agar tidak error jika wildcard gagal
          TARGET_FILE=$(find app/build/outputs/apk/release -name "*.apk" -type f | head -n 1)
          
          if [ -z "$TARGET_FILE" ]; then
            echo "ERROR: APK tidak ditemukan di folder build!"
            exit 1
          fi
          
          # Salin ke bunker dengan nama statis agar tidak ada spasi/karakter aneh
          cp "$TARGET_FILE" bunker_zone/raw.apk
          echo "Target berhasil diamankan ke bunker: $TARGET_FILE"

          # 4. Siapkan Keystore di dalam bunker
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > bunker_zone/release.jks

          # 5. Eksekusi di dalam Bunker
          cd bunker_zone
          
          # Langkah A: Zipalign (Input & Output sangat spesifik)
          "$ZIPALIGN" -f -v 4 raw.apk aligned.apk
          
          # Langkah B: Signing (Output langsung dilempar ke root workspace)
          "$APKSIGNER" sign --ks release.jks \
            --ks-key-alias "${{ secrets.ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEY_STORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out ../IDEku-Final.apk \
            aligned.apk

          # 6. Verifikasi Akhir
          cd ..
          "$APKSIGNER" verify IDEku-Final.apk
          echo "OPERASI SELESAI: IDEku-Final.apk mendarat dengan selamat."

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: IDEku-Final.apk
          name: "IDEku Build v1.0.${{ github.run_number }}"
          tag_name: "v1.0.${{ github.run_number }}"
          body: |
            ### 🚀 NASA-IDE Build Success!
            - **Commit:** `${{ github.sha }}`
            - **Status:** Signed, Zipaligned, & NDK-Enabled.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
