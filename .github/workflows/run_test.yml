name: Radar Deteksi Error (CI)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Tombol manual untuk tes kapan saja

jobs:
  test_build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Auto-Fetch & Patch Modules
        # Mengambil modul Termux agar build bisa berjalan utuh
        run: |
          git clone --depth 1 https://github.com/termux/termux-app.git temp_termux
          rm -rf terminal-view terminal-emulator
          mv temp_termux/terminal-view .
          mv temp_termux/terminal-emulator .
          rm -rf temp_termux
          
          # Patching minimalis agar Gradle mengenali modul
          sed -i '/sdkVersion/d' terminal-view/src/main/AndroidManifest.xml
          sed -i '/sdkVersion/d' terminal-emulator/src/main/AndroidManifest.xml
          
          echo "android { namespace 'com.termux.view'; compileSdk 34 }" >> terminal-view/build.gradle
          echo "android { namespace 'com.termux.terminal'; compileSdk 34 }" >> terminal-emulator/build.gradle

      - name: Jalankan Cek Kesehatan (Lint & Build)
        # Menjalankan 'assembleDebug' untuk memastikan kode bisa dikompilasi
        run: ./gradlew assembleDebug
